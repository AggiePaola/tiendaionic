<ion-header>
  <ion-toolbar>
    <ion-title>Productos 🛍️</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-spinner *ngIf="cargando" style="display:block; margin:20px auto;"></ion-spinner>

  <ion-button routerLink="/carrito" expand="block" color="warning">
    Ver carrito
  </ion-button>

  <ion-card *ngFor="let producto of productos">

    <img [src]="producto.image" />

    <ion-card-header>
      <ion-card-title>{{ producto.title }}</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <p>Precio: ${{ producto.price }}</p>
    </ion-card-content>

    <ion-button expand="full" color="success" (click)="agregarAlCarrito(producto)">
      Agregar al carrito
    </ion-button>

  </ion-card>

</ion-content>
